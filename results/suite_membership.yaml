# All tasks start in capability suite.
# Tasks promoted to regression when they discriminate between models.
# Tasks retired from capability when saturated (pass@5 > 0.95 all models, 3+ runs)
#   OR when unsourceable (no zero-login dataset available).
# Tasks blocked when data quality prevents valid evaluation (return to capability when fixed).

