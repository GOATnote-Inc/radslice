ground_truth:
  primary_diagnosis: "Perforated appendicitis with pericecal collection"
  differential:
    - "Right-sided diverticulitis"
    - "Cecal neoplasm with perforation"
    - "Crohn disease of the terminal ileum"
  key_findings:
    - { finding: "Pericecal/right paracolic focal collection with fat stranding", location: "right lower quadrant / cecal base", required: true }
    - { finding: "Appendicolith in the right iliac fossa", location: "appendiceal region", required: true }
    - { finding: "Adjacent cecal wall thickening", location: "cecal base", required: false }
  severity: "moderate"
  laterality: "right"
  negatives:
    - "No free intraperitoneal air"
    - "No diffuse peritonitis"
pattern_checks:
  - { name: "diagnosis_mentioned", check_type: regex, pattern: "(?i)(appendicitis|perforat.*appendix|appendiceal)", required: true }
  - { name: "key_finding_appendix", check_type: regex, pattern: "(?i)(pericecal|fat\\s*stranding|appendicolith|collection|abscess)", required: true }
reference_solution: |
  Contrast-enhanced CT of the abdomen and pelvis demonstrates an ill-defined pericecal/right paracolic focal collection with surrounding fat stranding and adjacent cecal wall thickening. An approximately 10 x 9 mm hyperdense appendicolith is identified in the right iliac fossa. The appendix cannot be separately delineated, consistent with perforation. No free intraperitoneal air or diffuse peritonitis. Findings are consistent with perforated appendicitis with localized pericecal collection.
