reference_solution: |
  Coronal non-contrast CT of the abdomen demonstrates bilateral renal enlargement with perinephric fat stranding surrounding both kidneys. The renal parenchyma shows heterogeneous attenuation bilaterally. No renal abscess, obstructing ureteral calculus, or hydronephrosis is identified. Findings are consistent with bilateral acute pyelonephritis.
