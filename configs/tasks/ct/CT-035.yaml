    - "Gallbladder carcinoma"
    - "Hepatitis"
  key_findings:
    - { finding: "Gallbladder wall thickening and hyperenhancement", location: "gallbladder", required: true }
    - { finding: "Pericholecystic fat stranding and fluid", location: "gallbladder fossa", required: true }
