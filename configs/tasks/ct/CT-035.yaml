  - { name: "key_finding_gb_wall", check_type: regex, pattern: "(?i)(gallbladder\\s*wall\\s*thicken|pericholecystic|gb.*thicken)", required: true }
reference_solution: |
  Contrast-enhanced CT of the abdomen demonstrates gallbladder distension with wall thickening and enhancement, consistent with acute cholecystitis. The gallbladder has a Phrygian cap morphology (normal anatomic variant with fundal fold creating two apparent lumens on sagittal imaging). Choledocholithiasis is present. There is no gallbladder perforation or free fluid. Findings are consistent with acute calculous cholecystitis with choledocholithiasis in a Phrygian cap gallbladder.
