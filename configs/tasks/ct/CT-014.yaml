reference_solution: |
  Non-contrast CT head demonstrates a hyperdense intraparenchymal hematoma centered in the right caudate nucleus measuring approximately 17 cm3 with extension of hemorrhage into the right lateral ventricle and third ventricle. Mild leftward midline shift is noted. No subarachnoid hemorrhage identified. Findings are consistent with acute hypertensive intracerebral hemorrhage with intraventricular extension.
