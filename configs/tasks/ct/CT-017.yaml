reference_solution: |
  Non-contrast CT head demonstrates a hyperdense crescentic extra-axial collection along the left frontotemporoparietal convexity, consistent with acute subdural hematoma. There is rightward midline shift of approximately 5 mm with effacement of the left lateral ventricle and subfalcine herniation. No underlying skull fracture is identified. Findings represent an acute subdural hematoma with significant mass effect requiring emergent neurosurgical evaluation.
